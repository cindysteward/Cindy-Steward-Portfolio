observable_dimensions:
  - name: "facial_asymmetry"
    description: "Left-right asymmetry in facial movements"
    applicable_groups: ["A", "B", "C"]
  - name: "execution_correctness"
    description: "Whether task was executed correctly"
    applicable_groups: ["A", "B", "C"]
  - name: "temporal_stability"
    description: "Consistency of timing within and across repetitions"
    applicable_groups: ["A", "B", "C"]
  - name: "error_consistency"
    description: "Pattern consistency of errors across repetitions"
    applicable_groups: ["A", "B", "C"]
